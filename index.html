<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPH 流水线计算器</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--blue:#58a6ff;--orange:#f0883e;--green:#3fb950;--text:#e6edf3;--text2:#8b949e;--red:#f85149;--purple:#a371f7}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;font-size:14px}
.header{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--card);position:sticky;top:0;z-index:10}
.header-title{font-size:16px;font-weight:600}
.header-config{display:flex;align-items:center;gap:8px}
.config-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;min-width:120px}
.config-btn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer}
.config-btn:hover{border-color:var(--blue);color:var(--blue)}
.main{padding:16px;max-width:800px;margin:0 auto}
.section{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:16px}
.section-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.param-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.param-label{color:var(--text2)}
.param-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;width:100px;text-align:right}
.station-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px}
.station-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.station-index{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.station-name{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;font-weight:500;outline:none}
.station-delete{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:18px}
.station-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:10px;color:var(--text2);text-transform:uppercase}
.field input{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px}
.add-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text2);padding:10px;border-radius:6px;cursor:pointer;margin-top:8px}
.add-btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{flex:1;padding:12px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.results{display:none}
.result-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.result-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px}
.result-label{font-size:10px;color:var(--text2);text-transform:uppercase;margin-bottom:4px}
.result-value{font-size:20px;font-weight:600}
.result-value.blue{color:var(--blue)}
.result-value.green{color:var(--green)}
.result-value.orange{color:var(--orange)}
.result-sub{font-size:11px;color:var(--text2);margin-top:2px}
.timeline-section{margin-top:16px}
.timeline-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.timeline{position:relative;padding:8px 0}
.timeline-track{height:4px;background:var(--border);border-radius:2px;position:relative;overflow:hidden}
.timeline-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:2px;width:0;transition:width 0.1s}
.timeline-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px}
.timeline-events{margin-top:12px;max-height:300px;overflow-y:auto}
.event-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border)}
.event-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.event-text{color:var(--text2)}
.event-time{color:var(--text);font-weight:500;margin-left:auto}
.utilization{margin-top:12px}
.util-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.util-label{width:60px;font-size:11px;color:var(--text2)}
.util-bar{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.util-fill{height:100%;border-radius:4px}
.util-pct{width:40px;font-size:11px;text-align:right}
.bottleneck{border-color:var(--orange)}
.btl-tag{background:var(--orange);color:#000;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px;margin-left:8px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;min-width:300px}
.modal-title{font-size:14px;font-weight:600;margin-bottom:12px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;margin-bottom:12px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;border:none}
.modal-btn-primary{background:var(--blue);color:#fff}
.modal-btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:6px;font-size:12px;font-weight:500;opacity:0;transition:opacity 0.3s;z-index:200}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <div class="header-title">UPH 流水线计算器</div>
  <div class="header-config">
    <select class="config-select" id="configSelect"></select>
    <button class="config-btn" id="saveBtn">保存</button>
    <button class="config-btn" id="saveAsBtn">另存为</button>
    <button class="config-btn" id="deleteBtn">删除</button>
  </div>
</div>
<div class="main">
  <div class="section">
    <div class="section-title">基本参数</div>
    <div class="param-row">
      <span class="param-label">产品总数</span>
      <input class="param-input" type="number" id="productCount" value="13" min="1">
    </div>
  </div>
  <div class="section">
    <div class="section-title">工站配置</div>
    <div id="stationList"></div>
    <button class="add-btn" id="addBtn">+ 添加工站</button>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="runBtn">计算</button>
    <button class="btn btn-secondary" id="resetBtn">重置</button>
  </div>
  <div class="results" id="results">
    <div class="section">
      <div class="section-title">计算结果</div>
      <div class="result-grid">
        <div class="result-item">
          <div class="result-label">实际 UPH</div>
          <div class="result-value blue" id="uphValue">-</div>
          <div class="result-sub">件/小时</div>
        </div>
        <div class="result-item">
          <div class="result-label">总耗时</div>
          <div class="result-value green" id="timeValue">-</div>
          <div class="result-sub" id="timeSub">-</div>
        </div>
        <div class="result-item">
          <div class="result-label">理论 UPH</div>
          <div class="result-value" id="theoryValue">-</div>
          <div class="result-sub">瓶颈工站限制</div>
        </div>
        <div class="result-item">
          <div class="result-label">瓶颈工站</div>
          <div class="result-value orange" id="btlValue">-</div>
          <div class="result-sub" id="btlSub">-</div>
        </div>
      </div>
      <div class="utilization" id="utilization"></div>
    </div>
    <div class="section timeline-section">
      <div class="timeline-header">
        <span class="section-title" style="margin:0">时间线</span>
        <span style="font-size:12px;color:var(--orange)" id="currentTime">T = 0 min</span>
      </div>
      <div class="timeline">
        <div class="timeline-track">
          <div class="timeline-fill" id="timelineFill"></div>
        </div>
        <div class="timeline-labels">
          <span>0 min</span>
          <span id="endTime">-</span>
        </div>
      </div>
      <div class="timeline-events" id="events"></div>
    </div>
  </div>
</div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle">配置名称</div>
    <input class="modal-input" type="text" id="modalInput" placeholder="输入配置名称">
    <div class="modal-btns">
      <button class="modal-btn modal-btn-secondary" id="modalCancel">取消</button>
      <button class="modal-btn modal-btn-primary" id="modalConfirm">确定</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var COLORS=['#58a6ff','#3fb950','#f0883e','#a371f7','#f85149','#79c0ff','#7ee787','#ffa657'];

// 配置管理
var CONFIG_KEY='uph_configs';
var CURRENT_KEY='uph_current';

var defaultConfig={
  name:'默认配置',
  productCount:13,
  stations:[
    {name:'焊接',time:6,buffer:2},
    {name:'切割',time:20,buffer:2},
    {name:'清洗',time:8,buffer:2}
  ]
};

function getConfigs(){
  var data=localStorage.getItem(CONFIG_KEY);
  if(!data){
    var configs={};
    configs[defaultConfig.name]=defaultConfig;
    localStorage.setItem(CONFIG_KEY,JSON.stringify(configs));
    return configs;
  }
  return JSON.parse(data);
}

function saveConfigs(configs){
  localStorage.setItem(CONFIG_KEY,JSON.stringify(configs));
}

function getCurrentConfigName(){
  return localStorage.getItem(CURRENT_KEY)||'默认配置';
}

function setCurrentConfigName(name){
  localStorage.setItem(CURRENT_KEY,name);
}

function loadConfig(name){
  var configs=getConfigs();
  var config=configs[name]||defaultConfig;
  setCurrentConfigName(name);
  document.getElementById('productCount').value=config.productCount||13;
  stations.length=0;
  (config.stations||defaultConfig.stations).forEach(function(s){
    stations.push({name:s.name,time:s.time,buffer:s.buffer});
  });
  renderStations();
  updateConfigSelect();
}

function updateConfigSelect(){
  var configs=getConfigs();
  var current=getCurrentConfigName();
  var html='';
  Object.keys(configs).forEach(function(name){
    html+='<option value="'+name+'"'+(name===current?' selected':'')+'>'+name+'</option>';
  });
  document.getElementById('configSelect').innerHTML=html;
}

function getCurrentConfig(){
  return{
    name:getCurrentConfigName(),
    productCount:parseInt(document.getElementById('productCount').value)||13,
    stations:stations.map(function(s){return{name:s.name,time:s.time,buffer:s.buffer};})
  };
}

function showToast(msg){
  var toast=document.getElementById('toast');
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(function(){toast.classList.remove('show');},2000);
}

function showModal(title,defaultName,onConfirm){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalInput').value=defaultName;
  document.getElementById('modal').classList.add('show');
  document.getElementById('modalInput').focus();
  document.getElementById('modalConfirm').onclick=function(){
    var name=document.getElementById('modalInput').value.trim();
    if(name){
      document.getElementById('modal').classList.remove('show');
      onConfirm(name);
    }
  };
}

document.getElementById('modalCancel').onclick=function(){
  document.getElementById('modal').classList.remove('show');
};

document.getElementById('configSelect').onchange=function(){
  loadConfig(this.value);
};

document.getElementById('saveBtn').onclick=function(){
  var config=getCurrentConfig();
  var configs=getConfigs();
  configs[config.name]=config;
  saveConfigs(configs);
  showToast('配置已保存');
};

document.getElementById('saveAsBtn').onclick=function(){
  var current=getCurrentConfigName();
  showModal('另存为',current+' 副本',function(name){
    var config=getCurrentConfig();
    config.name=name;
    var configs=getConfigs();
    configs[name]=config;
    saveConfigs(configs);
    setCurrentConfigName(name);
    updateConfigSelect();
    showToast('配置已保存为: '+name);
  });
};

document.getElementById('deleteBtn').onclick=function(){
  var current=getCurrentConfigName();
  var configs=getConfigs();
  if(Object.keys(configs).length<=1){
    showToast('至少保留一个配置');
    return;
  }
  delete configs[current];
  saveConfigs(configs);
  var first=Object.keys(configs)[0];
  loadConfig(first);
  showToast('配置已删除');
};

// 工站管理
var stations=[
  {name:'焊接',time:6,buffer:2},
  {name:'切割',time:20,buffer:2},
  {name:'清洗',time:8,buffer:2}
];

function renderStations(){
  var html='';
  stations.forEach(function(s,i){
    var c=COLORS[i%COLORS.length];
    html+='<div class="station-card" id="st'+i+'">'+
      '<div class="station-header">'+
        '<div class="station-index" style="background:'+c+'22;color:'+c+'">'+(i+1)+'</div>'+
        '<input class="station-name" value="'+s.name+'" data-idx="'+i+'">'+
        (stations.length>1?'<button class="station-delete" data-idx="'+i+'">x</button>':'')+
      '</div>'+
      '<div class="station-fields">'+
        '<div class="field"><label>处理时间 (分钟)</label><input type="number" value="'+s.time+'" data-idx="'+i+'" data-field="time" min="1"></div>'+
        '<div class="field"><label>缓冲容量</label><input type="number" value="'+s.buffer+'" data-idx="'+i+'" data-field="buffer" min="1"></div>'+
      '</div>'+
    '</div>';
  });
  document.getElementById('stationList').innerHTML=html;
  document.querySelectorAll('.station-name').forEach(function(el){
    el.oninput=function(){stations[el.dataset.idx].name=el.value;};
  });
  document.querySelectorAll('[data-field]').forEach(function(el){
    el.oninput=function(){
      stations[el.dataset.idx][el.dataset.field]=Math.max(1,parseInt(el.value)||1);
    };
  });
  document.querySelectorAll('.station-delete').forEach(function(el){
    el.onclick=function(){stations.splice(el.dataset.idx,1);renderStations();};
  });
}

renderStations();
document.getElementById('addBtn').onclick=function(){
  stations.push({name:'工站'+(stations.length+1),time:10,buffer:2});
  renderStations();
};

// 初始化配置
updateConfigSelect();
loadConfig(getCurrentConfigName());

// 核心模拟函数 - 正确实现阻塞反压
function simulate(nProducts, stns) {
  if (stns.length === 0 || nProducts === 0) return null;
  
  var nStations = stns.length;
  var productTimeline = [];
  for (var p = 0; p < nProducts; p++) productTimeline.push([]);
  
  var buffer = [];
  for (var s = 0; s < nStations; s++) buffer.push([]);
  
  var bufferCap = [Infinity];
  for (var s = 1; s < nStations; s++) bufferCap.push(stns[s].buffer);
  
  for (var p = 0; p < nProducts; p++) buffer[0].push(p);
  
  var machineProduct = [], machineFinish = [];
  var stationBlocked = [], blockedProducts = [];
  for (var s = 0; s < nStations; s++) {
    machineProduct.push(null);
    machineFinish.push(0);
    stationBlocked.push(false);
    blockedProducts.push([]);
  }
  
  var events = [];
  
  function tryStart(s, now) {
    if (machineProduct[s] !== null) return;
    if (stationBlocked[s]) return;
    if (buffer[s].length === 0) return;
    
    var p = buffer[s].shift();
    var start = now;
    var end = start + stns[s].time;
    
    machineProduct[s] = p;
    machineFinish[s] = end;
    productTimeline[p].push({station: s, start: start, end: end});
    events.push({time: end, type: 'complete', station: s, product: p});
  }
  
  function checkUnblock(s, now) {
    if (s >= nStations - 1) return;
    if (!stationBlocked[s]) return;
    
    var nextS = s + 1;
    if (buffer[nextS].length < bufferCap[nextS]) {
      if (blockedProducts[s].length > 0) {
        var p = blockedProducts[s].shift();
        buffer[nextS].push(p);
        tryStart(nextS, now);
      }
      if (blockedProducts[s].length === 0) {
        stationBlocked[s] = false;
        tryStart(s, now);
      }
    }
  }
  
  var now = 0;
  for (var s = 0; s < nStations; s++) tryStart(s, now);
  
  var maxIter = nProducts * nStations * 100 + 10000;
  var iter = 0;
  
  while (events.length > 0 && iter++ < maxIter) {
    events.sort(function(a, b) { return a.time - b.time; });
    var ev = events.shift();
    now = ev.time;
    
    if (ev.type === 'complete') {
      var s = ev.station;
      var p = ev.product;
      
      machineProduct[s] = null;
      machineFinish[s] = 0;
      
      if (s < nStations - 1) {
        var nextS = s + 1;
        if (buffer[nextS].length < bufferCap[nextS]) {
          buffer[nextS].push(p);
          tryStart(nextS, now);
        } else {
          blockedProducts[s].push(p);
          stationBlocked[s] = true;
        }
      } else {
        for (var up = 0; up < nStations - 1; up++) checkUnblock(up, now);
      }
      
      tryStart(s, now);
      for (var up = 0; up < s; up++) checkUnblock(up, now);
    }
  }
  
  var totalTime = 0, completed = 0;
  for (var p = 0; p < nProducts; p++) {
    if (productTimeline[p].length > 0) {
      var last = productTimeline[p][productTimeline[p].length - 1];
      if (last.end > totalTime) totalTime = last.end;
      if (productTimeline[p].length === nStations) completed++;
    }
  }
  
  var busyTime = [];
  for (var s = 0; s < nStations; s++) busyTime.push(0);
  for (var p = 0; p < nProducts; p++) {
    for (var i = 0; i < productTimeline[p].length; i++) {
      var ev = productTimeline[p][i];
      busyTime[ev.station] += ev.end - ev.start;
    }
  }
  var utilization = [];
  for (var s = 0; s < nStations; s++) utilization.push(totalTime > 0 ? busyTime[s] / totalTime : 0);
  
  var btlIdx = 0, maxU = 0;
  for (var s = 0; s < nStations; s++) {
    if (utilization[s] > maxU) { maxU = utilization[s]; btlIdx = s; }
  }
  
  var slowest = 0;
  for (var s = 0; s < nStations; s++) if (stns[s].time > slowest) slowest = stns[s].time;
  var theoryUPH = slowest > 0 ? 60 / slowest : 0;
  var actualUPH = totalTime > 0 ? nProducts / (totalTime / 60) : 0;
  
  return {
    timeline: productTimeline,
    totalTime: totalTime,
    uph: actualUPH,
    theoryUPH: theoryUPH,
    btlIdx: btlIdx,
    util: utilization,
    nProducts: nProducts,
    completed: completed,
    stations: stns.map(function(s) { return { name: s.name, time: s.time }; })
  };
}

function showResults(r){
  document.getElementById('results').style.display='block';
  document.getElementById('uphValue').textContent=r.uph.toFixed(2);
  var h=Math.floor(r.totalTime/60);
  var m=Math.round(r.totalTime%60);
  document.getElementById('timeValue').textContent=r.totalTime.toFixed(0)+' min';
  document.getElementById('timeSub').textContent=h>0?h+'h '+m+'m':m+'m';
  document.getElementById('theoryValue').textContent=r.theoryUPH.toFixed(2);
  document.getElementById('btlValue').textContent=r.stations[r.btlIdx].name;
  document.getElementById('btlSub').textContent='利用率 '+Math.round(r.util[r.btlIdx]*100)+'%';
  document.getElementById('endTime').textContent=r.totalTime.toFixed(0)+' min';
  var utilHtml='';
  r.stations.forEach(function(s,i){
    var c=COLORS[i%COLORS.length];
    var pct=Math.round(r.util[i]*100);
    utilHtml+='<div class="util-row">'+
      '<span class="util-label">'+s.name+'</span>'+
      '<div class="util-bar"><div class="util-fill" style="width:'+pct+'%;background:'+c+'"></div></div>'+
      '<span class="util-pct" style="color:'+c+'">'+pct+'%</span>'+
    '</div>';
  });
  document.getElementById('utilization').innerHTML=utilHtml;
  document.querySelectorAll('.station-card').forEach(function(c,i){
    c.classList.toggle('bottleneck',i===r.btlIdx);
    var tag=c.querySelector('.btl-tag');
    if(tag)tag.remove();
    if(i===r.btlIdx){
      var t=document.createElement('span');
      t.className='btl-tag';
      t.textContent='瓶颈';
      c.querySelector('.station-header').appendChild(t);
    }
  });
  var eventsHtml='';
  var allEvents=[];
  for(var p=0;p<r.nProducts;p++){
    for(var e=0;e<r.timeline[p].length;e++){
      var ev=r.timeline[p][e];
      allEvents.push({product:p,station:ev.station,start:ev.start,end:ev.end});
    }
  }
  allEvents.sort(function(a,b){return a.start-b.start;});
  var shown=0;
  allEvents.forEach(function(ev){
    if(shown++>=100)return;
    var c=COLORS[ev.station%COLORS.length];
    eventsHtml+='<div class="event-row">'+
      '<div class="event-dot" style="background:'+c+'"></div>'+
      '<span class="event-text">产品 '+(ev.product+1)+' -> '+r.stations[ev.station].name+'</span>'+
      '<span class="event-time">'+ev.start.toFixed(0)+'-'+ev.end.toFixed(0)+'m</span>'+
    '</div>';
  });
  document.getElementById('events').innerHTML=eventsHtml;
}

document.getElementById('runBtn').onclick=function(){
  var n=parseInt(document.getElementById('productCount').value)||13;
  var r=simulate(n,stations);
  if(r){
    showResults(r);
    document.getElementById('timelineFill').style.width='100%';
    document.getElementById('currentTime').textContent='T = '+r.totalTime.toFixed(0)+' min';
  }
};

document.getElementById('resetBtn').onclick=function(){
  document.getElementById('results').style.display='none';
  document.getElementById('timelineFill').style.width='0';
  document.getElementById('currentTime').textContent='T = 0 min';
  document.querySelectorAll('.station-card').forEach(function(c){
    c.classList.remove('bottleneck');
    var tag=c.querySelector('.btl-tag');
    if(tag)tag.remove();
  });
};
</script>
</body>
</html>
