<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UPH 流水线计算器</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--blue:#58a6ff;--orange:#f0883e;--green:#3fb950;--text:#e6edf3;--text2:#8b949e;--red:#f85149;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:14px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.header{border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(22,27,34,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.header-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:600}
.header-title .icon{width:24px;height:24px;background:linear-gradient(135deg,var(--blue),var(--orange));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.speed-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;outline:none}
.speed-select:focus{border-color:var(--blue)}
.main{padding:12px;padding-bottom:80px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.basic-param{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.param-row{display:flex;align-items:center;justify-content:space-between}
.param-label{font-size:13px;color:var(--text2)}
.param-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;width:80px;text-align:right;outline:none}
.param-input:focus{border-color:var(--blue)}
.station-list{display:flex;flex-direction:column;gap:8px}
.station-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;position:relative}
.station-card.bottleneck{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange)}
.station-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.station-index{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.station-name-input{background:transparent;border:none;color:var(--text);font-size:14px;font-weight:500;flex:1;outline:none;padding:2px 0}
.station-delete{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;line-height:1}
.station-delete:hover{color:var(--red)}
.station-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.station-field{display:flex;flex-direction:column;gap:4px}
.station-field label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.station-field input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;width:100%}
.station-field input:focus{border-color:var(--blue)}
.station-field .unit{font-size:10px;color:var(--text2)}
.station-util-bar{margin-top:10px;display:flex;align-items:center;gap:8px}
.util-label{font-size:10px;color:var(--text2);width:40px;flex-shrink:0}
.util-bar-bg{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.util-bar-fill{height:100%;border-radius:2px}
.util-pct{font-size:10px;color:var(--text2);width:30px;text-align:right}
.btl-tag{position:absolute;top:-6px;right:8px;background:var(--orange);color:#000;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
.add-station-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text2);padding:10px;border-radius:var(--radius);cursor:pointer;font-size:13px;margin-top:8px}
.add-station-btn:hover{border-color:var(--blue);color:var(--blue)}
.controls{position:fixed;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 16px;background:rgba(13,17,23,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:10}
.btn{flex:1;padding:12px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--blue),#4090e0);color:#fff}
.btn-primary.playing{background:linear-gradient(135deg,var(--orange),#d07030)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.gantt-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:12px}
.gantt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.gantt-time-now{font-size:12px;color:var(--orange);background:rgba(240,136,62,0.1);padding:3px 8px;border-radius:4px;border:1px solid rgba(240,136,62,0.3)}
.gantt-container{overflow:auto;position:relative;min-height:150px}
#ganttCanvas{display:block}
.empty-gantt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text2)}
.empty-gantt-icon{font-size:32px;opacity:0.3}
.empty-gantt-text{font-size:13px}
.results-section{margin-top:12px}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.result-card.highlight{border-color:var(--green)}
.result-card.warning{border-color:var(--orange)}
.result-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.result-value{font-size:18px;font-weight:600;line-height:1}
.result-value.blue{color:var(--blue)}
.result-value.green{color:var(--green)}
.result-value.orange{color:var(--orange)}
.result-sub{font-size:10px;color:var(--text2);margin-top:3px}
.usage-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.usage-pill{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:4px 8px;font-size:11px}
.usage-pill-dot{width:6px;height:6px;border-radius:50%}
.usage-pill-name{color:var(--text2)}
.usage-pill-val{font-weight:600;font-size:10px}
.sim-progress{margin-top:12px}
.sim-progress-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.sim-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--orange));border-radius:3px}
.sim-time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px}
.tooltip{position:fixed;background:#1c2128;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--text);pointer-events:none;z-index:100;max-width:180px;box-shadow:0 4px 16px rgba(0,0,0,0.4);display:none}
.tooltip-name{font-weight:600;color:var(--blue);margin-bottom:3px}
.tooltip-time{color:var(--text2);font-size:10px}
.algo-toggle{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;margin-top:12px}
.algo-toggle-text{font-size:12px;color:var(--text2)}
.algo-toggle-icon{color:var(--text2);transition:transform 0.2s}
.algo-toggle.open .algo-toggle-icon{transform:rotate(180deg)}
.algo-expl{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);padding:12px;font-size:11px;color:var(--text2);line-height:1.6;display:none}
.algo-expl.show{display:block}
.algo-expl strong{color:var(--text)}
.algo-expl .k{color:var(--blue)}
@media(min-width:768px){.main{display:grid;grid-template-columns:320px 1fr;gap:0;padding:0;min-height:calc(100vh - 49px);padding-bottom:0}.left-panel{border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 49px)}.right-panel{display:flex;flex-direction:column;overflow:hidden}.gantt-section{flex:1;border:none;border-bottom:1px solid var(--border);border-radius:0;margin:0;min-height:0}.results-section{padding:16px;overflow-y:auto;margin:0}.controls{position:static;padding:0;background:transparent;border:none;margin-top:12px}.results-grid{grid-template-columns:repeat(4,1fr)}.station-fields{gap:8px}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:slideUp 0.3s ease forwards}
</style>
</head>
<body>
<div class="header">
  <div class="header-title"><div class="icon">⚙</div>UPH 计算器</div>
  <select class="speed-select" id="speedSelect">
    <option value="0.5">0.5x</option>
    <option value="1" selected>1x</option>
    <option value="2">2x</option>
    <option value="5">5x</option>
    <option value="0">瞬间</option>
  </select>
</div>
<div class="main">
  <div class="left-panel">
    <div class="section-title">📦 基本参数</div>
    <div class="basic-param">
      <div class="param-row">
        <span class="param-label">产品总数</span>
        <input class="param-input" type="number" id="productCount" value="13" min="1" max="500">
      </div>
    </div>
    <div class="section-title">🔧 工站配置</div>
    <div class="station-list" id="stationList"></div>
    <button class="add-station-btn" id="addStationBtn">+ 添加工站</button>
    <div class="controls">
      <button class="btn btn-primary" id="simBtn"><span id="simBtnIcon">▶</span><span id="simBtnText">开始</span></button>
      <button class="btn btn-secondary" id="resetBtn">↺</button>
    </div>
    <div class="algo-toggle" id="algoToggle">
      <span class="algo-toggle-text">📌 查看模拟逻辑说明</span>
      <span class="algo-toggle-icon">▼</span>
    </div>
    <div class="algo-expl" id="algoExpl">
      <strong>模拟逻辑</strong><br>· 每站可设 <span class="k">缓冲区容量</span>（初始=1）<br>· 产品完成工站i后，检查工站i+1缓冲是否满<br>· 未满 → 进入缓冲；<strong>已满 → 卡在当前工站出口</strong><br>· 各站机器按 FIFO 从缓冲取产品
    </div>
  </div>
  <div class="right-panel">
    <div class="gantt-section">
      <div class="gantt-header">
        <div class="section-title" style="margin:0">📊 甘特图</div>
        <div class="gantt-time-now" id="ganttTimeNow">T = 0 min</div>
      </div>
      <div class="gantt-container" id="ganttContainer">
        <canvas id="ganttCanvas"></canvas>
        <div class="empty-gantt" id="emptyGantt">
          <div class="empty-gantt-icon">📈</div>
          <div class="empty-gantt-text">点击「开始」运行模拟</div>
        </div>
      </div>
    </div>
    <div class="results-section" id="resultsSection" style="display:none">
      <div class="section-title">📈 结果</div>
      <div class="results-grid">
        <div class="result-card highlight animate-in"><div class="result-label">UPH 产能</div><div class="result-value green" id="resUPH">—</div><div class="result-sub">片/小时</div></div>
        <div class="result-card animate-in"><div class="result-label">总时间</div><div class="result-value blue" id="resTotalTime">—</div><div class="result-sub" id="resTotalTimeSub">—</div></div>
        <div class="result-card animate-in"><div class="result-label">理论 UPH</div><div class="result-value" id="resTheoreticalUPH">—</div><div class="result-sub">上限</div></div>
        <div class="result-card warning animate-in"><div class="result-label">瓶颈</div><div class="result-value orange" id="resBottleneck">—</div><div class="result-sub" id="resBottleneckSub">—</div></div>
      </div>
      <div class="usage-pills" id="usagePills"></div>
      <div class="sim-progress" id="simProgress" style="display:none">
        <div class="sim-progress-track"><div class="sim-progress-fill" id="simProgressFill" style="width:0%"></div></div>
        <div class="sim-time-labels"><span>0</span><span id="simProgressEnd">—</span></div>
      </div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"><div class="tooltip-name" id="ttName"></div><div class="tooltip-time" id="ttTime"></div></div>
<script>
var COLORS=['#58a6ff','#f0883e','#3fb950','#bc8cff','#ff7b72','#79c0ff','#ffa657','#56d364'];
var stations=[{name:'涂层',time:6,buffer:2},{name:'切割',time:20,buffer:2},{name:'清洗',time:8,buffer:2}];
var simResult=null,isPlaying=false,rafId=null,simStartWallTime=0,simStartTime=0,totalSimTime=0,speed=1;
document.getElementById('algoToggle').addEventListener('click',function(){this.classList.toggle('open');document.getElementById('algoExpl').classList.toggle('show');});
function renderStations(){var list=document.getElementById('stationList');list.innerHTML='';stations.forEach(function(s,i){var color=COLORS[i%COLORS.length];var card=document.createElement('div');card.className='station-card';card.id='station-'+i;card.innerHTML='<div class="station-header"><div class="station-index" style="background:'+color+'22;color:'+color+'">'+(i+1)+'</div><input class="station-name-input" value="'+s.name+'" data-i="'+i+'" placeholder="名称" maxlength="8" />'+(stations.length>1?'<button class="station-delete" data-i="'+i+'">×</button>':'')+'</div><div class="station-fields"><div class="station-field"><label>处理时间</label><input type="number" value="'+s.time+'" data-i="'+i+'" data-field="time" min="1" max="999" /><div class="unit">分钟/片</div></div><div class="station-field"><label>缓冲容量</label><input type="number" value="'+s.buffer+'" data-i="'+i+'" data-field="buffer" min="1" max="99" /><div class="unit">片</div></div></div><div class="station-util-bar" id="util-bar-'+i+'" style="display:none"><span class="util-label">利用率</span><div class="util-bar-bg"><div class="util-bar-fill" id="util-fill-'+i+'" style="width:0%;background:'+color+'"></div></div><span class="util-pct" id="util-pct-'+i+'">0%</span></div>';list.appendChild(card);});list.querySelectorAll('.station-name-input').forEach(function(el){el.addEventListener('input',function(e){stations[e.target.dataset.i].name=e.target.value;});});list.querySelectorAll('input[data-field]').forEach(function(el){el.addEventListener('input',function(e){var i=parseInt(e.target.dataset.i);var v=Math.max(1,parseInt(e.target.value)||1);stations[i][e.target.dataset.field]=v;});});list.querySelectorAll('.station-delete').forEach(function(el){el.addEventListener('click',function(e){stations.splice(parseInt(e.currentTarget.dataset.i),1);renderStations();});});}
document.getElementById('addStationBtn').addEventListener('click',function(){stations.push({name:'工站'+(stations.length+1),time:10,buffer:2});renderStations();});
function runSimulation(nProducts,stns){var n=stns.length;var productEvents=[];for(var p=0;p<nProducts;p++)productEvents.push([]);var buffers=[],bufferCap=[],bufferCount=[],blockedAt=[],machineFree=[];for(var i=0;i<n;i++){buffers.push([]);bufferCap.push(i===0?Infinity:stns[i].buffer);bufferCount.push(0);blockedAt.push([]);machineFree.push(0);}var productAt=[];for(var p=0;p<nProducts;p++)productAt.push(-1);var nextUnstarted=0;var eq=[];function scheduleProcess(product,station,startTime){var endTime=startTime+stns[station].time;machineFree[station]=endTime;productAt[product]=station;productEvents[product].push({station:station,start:startTime,end:endTime});eq.push({time:endTime,kind:'COMPLETE',product:product,station:station});}function tryStartFromBuffer(station,currentTime){if(buffers[station].length===0)return false;if(machineFree[station]>currentTime)return false;var product=buffers[station].shift();bufferCount[station]--;scheduleProcess(product,station,Math.max(currentTime,machineFree[station]));if(station>0&&blockedAt[station-1].length>0){if(bufferCount[station]<bufferCap[station]){var bp=blockedAt[station-1].shift();buffers[station].push(bp.product);bufferCount[station]++;productAt[bp.product]=station;eq.push({time:currentTime,kind:'MACHINE_FREE',station:station-1});}}return true;}nextUnstarted=1;scheduleProcess(0,0,0);eq.push({time:0,kind:'MACHINE_FREE',station:0});eq.push({time:machineFree[0],kind:'MACHINE_FREE',station:0});var iteration=0;var MAX_ITER=nProducts*n*10+1000;while(eq.length>0&&iteration++<MAX_ITER){eq.sort(function(a,b){return a.time-b.time||a.kind.localeCompare(b.kind);});var ev=eq.shift();var t=ev.time;var station=ev.station;if(ev.kind==='COMPLETE'){var product=ev.product;if(productAt[product]!==station)continue;if(station===n-1){productAt[product]=-2;}else{var next=station+1;if(bufferCount[next]<bufferCap[next]){buffers[next].push(product);bufferCount[next]++;productAt[product]=next;eq.push({time:t,kind:'MACHINE_FREE',station:station});if(machineFree[next]<=t)tryStartFromBuffer(next,t);}else{productAt[product]=-3;blockedAt[station].push({product:product,blockTime:t});}}}else if(ev.kind==='MACHINE_FREE'){var s=station;if(blockedAt[s].length>0){var nextS=s+1;if(nextS<n&&bufferCount[nextS]<bufferCap[nextS]){var bp=blockedAt[s].shift();buffers[nextS].push(bp.product);bufferCount[nextS]++;productAt[bp.product]=nextS;scheduleProcess(bp.product,s,Math.max(t,machineFree[s]));if(machineFree[nextS]<=t)tryStartFromBuffer(nextS,t);}continue;}if(tryStartFromBuffer(s,t))continue;if(s===0&&nextUnstarted<nProducts){if(machineFree[0]<=t){var product=nextUnstarted++;scheduleProcess(product,0,Math.max(t,machineFree[0]));}}}}var lastEventTimes=productEvents.map(function(evs){return evs.length?Math.max.apply(null,evs.map(function(e){return e.end;})):0;});var totalTime=Math.max.apply(null,lastEventTimes);var machineTotalBusy=[];for(var i=0;i<n;i++)machineTotalBusy.push(0);productEvents.forEach(function(evs,p){evs.forEach(function(e){machineTotalBusy[e.station]+=e.end-e.start;});});var utilization=machineTotalBusy.map(function(b){return totalTime>0?b/totalTime:0;});var bottleneckIdx=utilization.indexOf(Math.max.apply(null,utilization));var slowestTime=Math.max.apply(null,stns.map(function(s){return s.time;}));var theoreticalUPH=60/slowestTime;var actualUPH=nProducts/(totalTime/60);return{productEvents:productEvents,totalTime:totalTime,uph:actualUPH,theoreticalUPH:theoreticalUPH,bottleneckIdx:bottleneckIdx,utilization:utilization,productCount:nProducts,stations:stns.map(function(s){return{name:s.name,time:s.time};})};}
var canvas=document.getElementById('ganttCanvas');var ctx=canvas.getContext('2d');var tooltip=document.getElementById('tooltip');var ttName=document.getElementById('ttName');var ttTime=document.getElementById('ttTime');
function drawGantt(sim,currentTime){if(!sim)return;var productEvents=sim.productEvents,productCount=sim.productCount,stns=sim.stations,totalTime=sim.totalTime;var n=stns.length;var padL=40,padR=12,padT=24,padB=16;var rowH=22,rowPad=3;var totalH=padT+padB+productCount*(rowH+rowPad)+30;var totalW=Math.max(canvas.parentElement.clientWidth,300);var chartW=totalW-padL-padR;canvas.width=totalW;canvas.height=totalH;var tMax=Math.max(totalTime,1);ctx.fillStyle='#0d1117';ctx.fillRect(0,0,totalW,totalH);var numTicks=Math.min(8,Math.ceil(tMax/5));ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.textAlign='center';for(var i=0;i<=numTicks;i++){var t=Math.round(i*tMax/numTicks);var x=padL+(t/tMax)*chartW;ctx.fillText(t+'m',x,padT-8);ctx.strokeStyle='#21262d';ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,totalH-padB);ctx.stroke();}if(currentTime>0&&currentTime<=tMax){var cx=padL+(currentTime/tMax)*chartW;ctx.strokeStyle='#f0883e';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(cx,padT);ctx.lineTo(cx,totalH-padB);ctx.stroke();ctx.setLineDash([]);}productEvents.forEach(function(events,pIdx){var rowY=padT+pIdx*(rowH+rowPad);var rowMid=rowY+rowH/2;ctx.fillStyle=pIdx%2===0?'#161b22':'#0d1117';ctx.fillRect(padL,rowY,chartW,rowH);ctx.fillStyle='#58a6ff';ctx.font='bold 9px sans-serif';ctx.textAlign='right';ctx.fillText('P'+(pIdx+1),padL-4,rowMid+3);events.forEach(function(ev){var x1=padL+(Math.max(0,ev.start)/tMax)*chartW;var x2=padL+(ev.end/tMax)*chartW;var bw=Math.max(2,x2-x1);var color=COLORS[ev.station%COLORS.length];ctx.fillStyle=color+'cc';ctx.beginPath();ctx.roundRect(x1,rowY+2,bw,rowH-4,2);ctx.fill();if(bw>25){ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.textAlign='left';ctx.fillText(stns[ev.station].name,x1+3,rowMid+2);}});});var legendY=totalH-8;var lx=padL;stns.forEach(function(s,i){ctx.fillStyle=COLORS[i%COLORS.length];ctx.beginPath();ctx.roundRect(lx,legendY-6,10,6,1);ctx.fill();ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.textAlign='left';ctx.fillText(s.name,lx+12,legendY);lx+=ctx.measureText(s.name).width+24;});}
canvas.addEventListener('mousemove',function(e){if(!simResult)return;var rect=canvas.getBoundingClientRect();var mx=e.clientX-rect.left;var my=e.clientY-rect.top;var padL=40,padT=24;var rowH=22,rowPad=3;var chartW=canvas.width-padL-12;var tMax=Math.max(simResult.totalTime,1);var relY=my-padT;if(relY<0)return;var pIdx=Math.floor(relY/(rowH+rowPad));if(pIdx<0||pIdx>=simResult.productCount){tooltip.style.display='none';return;}var events=simResult.productEvents[pIdx]||[];var ev=null;for(var j=0;j<events.length;j++){var ee=events[j];var x1=padL+(ee.start/tMax)*chartW;var x2=padL+(ee.end/tMax)*chartW;if(mx>=x1&&mx<=x2){ev=ee;break;}}if(ev){ttName.textContent='P'+(pIdx+1)+' · '+simResult.stations[ev.station].name;ttTime.textContent=ev.start.toFixed(0)+'m → '+ev.end.toFixed(0)+'m';tooltip.style.display='block';tooltip.style.left=(e.clientX+10)+'px';tooltip.style.top=(e.clientY-10)+'px';}else{tooltip.style.display='none';}});canvas.addEventListener('mouseleave',function(){tooltip.style.display='none';});
function showResults(sim){var el=document.getElementById('resultsSection');el.style.display='block';var totalMin=sim.totalTime;var hours=Math.floor(totalMin/60);var mins=Math.round(totalMin%60);document.getElementById('resUPH').textContent=sim.uph.toFixed(2);document.getElementById('resTotalTime').textContent=totalMin.toFixed(0)+'m';document.getElementById('resTotalTimeSub').textContent=hours>0?hours+'h '+mins+'m':mins+'m';document.getElementById('resTheoreticalUPH').textContent=sim.theoreticalUPH.toFixed(2);document.getElementById('resBottleneck').textContent=sim.stations[sim.bottleneckIdx].name;document.getElementById('resBottleneckSub').textContent='利用率 '+(sim.utilization[sim.bottleneckIdx]*100).toFixed(0)+'%';sim.stations.forEach(function(s,i){var bar=document.getElementById('util-bar-'+i);if(!bar)return;bar.style.display='flex';document.getElementById('util-fill-'+i).style.width=(sim.utilization[i]*100)+'%';document.getElementById('util-pct-'+i).textContent=(sim.utilization[i]*100).toFixed(0)+'%';});document.querySelectorAll('.station-card').forEach(function(c,i){c.classList.toggle('bottleneck',i===sim.bottleneckIdx);var existing=c.querySelector('.btl-tag');if(existing)existing.remove();if(i===sim.bottleneckIdx){var tag=document.createElement('div');tag.className='btl-tag';tag.textContent='瓶颈';c.appendChild(tag);}});var pills=document.getElementById('usagePills');pills.innerHTML='';sim.stations.forEach(function(s,i){var pill=document.createElement('div');pill.className='usage-pill';pill.innerHTML='<div class="usage-pill-dot" style="background:'+COLORS[i%COLORS.length]+'"></div><span class="usage-pill-name">'+s.name+'</span><span class="usage-pill-val" style="color:'+COLORS[i%COLORS.length]+'">'+(sim.utilization[i]*100).toFixed(0)+'%</span>';pills.appendChild(pill);});document.getElementById('simProgressEnd').textContent=totalMin.toFixed(0)+' min';}
function stopSim(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}isPlaying=false;document.getElementById('simBtn').classList.remove('playing');document.getElementById('simBtnIcon').textContent='▶';document.getElementById('simBtnText').textContent='开始';document.getElementById('simProgress').style.display='none';}
function doSim(){stopSim();var nProducts=parseInt(document.getElementById('productCount').value)||13;simResult=runSimulation(nProducts,stations);totalSimTime=simResult.totalTime;showResults(simResult);document.getElementById('emptyGantt').style.display='none';drawGantt(simResult,0);document.getElementById('ganttTimeNow').textContent='T = 0 min';speed=parseFloat(document.getElementById('speedSelect').value);simStartWallTime=performance.now();simStartTime=0;document.getElementById('simBtn').classList.add('playing');document.getElementById('simBtnIcon').textContent='⏸';document.getElementById('simBtnText').textContent='暂停';if(speed===0){drawGantt(simResult,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+totalSimTime.toFixed(0)+' min';document.getElementById('simProgressFill').style.width='100%';stopSim();return;}document.getElementById('simProgress').style.display='block';function tick(){var elapsed=(performance.now()-simStartWallTime)/1000;var curT=Math.min(simStartTime+elapsed*speed,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+curT.toFixed(0)+' min';document.getElementById('simProgressFill').style.width=((curT/totalSimTime)*100).toFixed(1)+'%';drawGantt(simResult,curT);if(curT>=totalSimTime){stopSim();return;}rafId=requestAnimationFrame(tick);}rafId=requestAnimationFrame(tick);isPlaying=true;}
document.getElementById('simBtn').addEventListener('click',function(){if(isPlaying){stopSim();}else{doSim();}});
document.getElementById('resetBtn').addEventListener('click',function(){stopSim();simResult=null;document.getElementById('resultsSection').style.display='none';document.getElementById('emptyGantt').style.display='flex';document.getElementById('simProgress').style.display='none';ctx.clearRect(0,0,canvas.width,canvas.height);canvas.height=canvas.parentElement.clientHeight||300;document.getElementById('ganttTimeNow').textContent='T = 0 min';document.querySelectorAll('.station-card').forEach(function(c){c.classList.remove('bottleneck');var t=c.querySelector('.btl-tag');if(t)t.remove();var bar=c.querySelector('.station-util-bar');if(bar)bar.style.display='none';});});
document.getElementById('speedSelect').addEventListener('change',function(e){speed=parseFloat(e.target.value);if(isPlaying&&speed>0){var curT=parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0;stopSim();simStartWallTime=performance.now();simStartTime=curT;document.getElementById('simBtn').classList.add('playing');document.getElementById('simBtnIcon').textContent='⏸';document.getElementById('simBtnText').textContent='暂停';document.getElementById('simProgress').style.display='block';isPlaying=true;function tick(){var elapsed=(performance.now()-simStartWallTime)/1000;var curT2=Math.min(simStartTime+elapsed*speed,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+curT2.toFixed(0)+' min';document.getElementById('simProgressFill').style.width=((curT2/totalSimTime)*100).toFixed(1)+'%';drawGantt(simResult,curT2);if(curT2>=totalSimTime){stopSim();return;}rafId=requestAnimationFrame(tick);}rafId=requestAnimationFrame(tick);}});
renderStations();
window.addEventListener('resize',function(){if(simResult)drawGantt(simResult,parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0);});
</script>
