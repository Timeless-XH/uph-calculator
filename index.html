<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UPH 流水线计算器</title>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--blue:#58a6ff;--orange:#f0883e;--green:#3fb950;--text:#e6edf3;--text2:#8b949e;--red:#f85149;--radius:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;font-size:14px;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.header{border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(22,27,34,0.95);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:8px}
.header-title{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600}
.header-title .icon{width:22px;height:22px;background:linear-gradient(135deg,var(--blue),var(--orange));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px}
.header-right{display:flex;align-items:center;gap:6px}
.config-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer;outline:none;max-width:120px}
.config-select:focus{border-color:var(--blue)}
.config-btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:5px 8px;border-radius:6px;font-size:11px;cursor:pointer;outline:none;white-space:nowrap}
.config-btn:hover{border-color:var(--blue);color:var(--blue)}
.speed-select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:12px;cursor:pointer;outline:none}
.speed-select:focus{border-color:var(--blue)}
.main{padding:12px;padding-bottom:80px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin:16px 0 10px;display:flex;align-items:center;gap:6px}
.basic-param{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.param-row{display:flex;align-items:center;justify-content:space-between}
.param-label{font-size:13px;color:var(--text2)}
.param-input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;width:80px;text-align:right;outline:none}
.param-input:focus{border-color:var(--blue)}
.station-list{display:flex;flex-direction:column;gap:8px}
.station-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;position:relative}
.station-card.bottleneck{border-color:var(--orange);box-shadow:0 0 0 1px var(--orange)}
.station-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.station-index{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.station-name-input{background:transparent;border:none;color:var(--text);font-size:14px;font-weight:500;flex:1;outline:none;padding:2px 0}
.station-delete{background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:2px 6px;border-radius:4px;line-height:1}
.station-delete:hover{color:var(--red)}
.station-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.station-field{display:flex;flex-direction:column;gap:4px}
.station-field label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.station-field input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px;outline:none;width:100%}
.station-field input:focus{border-color:var(--blue)}
.station-field .unit{font-size:10px;color:var(--text2)}
.station-util-bar{margin-top:10px;display:flex;align-items:center;gap:8px}
.util-label{font-size:10px;color:var(--text2);width:40px;flex-shrink:0}
.util-bar-bg{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.util-bar-fill{height:100%;border-radius:2px}
.util-pct{font-size:10px;color:var(--text2);width:30px;text-align:right}
.btl-tag{position:absolute;top:-6px;right:8px;background:var(--orange);color:#000;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
.add-station-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text2);padding:10px;border-radius:var(--radius);cursor:pointer;font-size:13px;margin-top:8px}
.add-station-btn:hover{border-color:var(--blue);color:var(--blue)}
.controls{position:fixed;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 16px;background:rgba(13,17,23,0.95);backdrop-filter:blur(10px);border-top:1px solid var(--border);z-index:10}
.btn{flex:1;padding:12px;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--blue),#4090e0);color:#fff}
.btn-primary.playing{background:linear-gradient(135deg,var(--orange),#d07030)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.gantt-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-top:12px}
.gantt-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.gantt-time-now{font-size:12px;color:var(--orange);background:rgba(240,136,62,0.1);padding:3px 8px;border-radius:4px;border:1px solid rgba(240,136,62,0.3)}
.gantt-container{overflow:auto;position:relative;min-height:150px}
#ganttCanvas{display:block}
.empty-gantt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--text2)}
.empty-gantt-icon{font-size:32px;opacity:0.3}
.empty-gantt-text{font-size:13px}
.results-section{margin-top:12px}
.results-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.result-card.highlight{border-color:var(--green)}
.result-card.warning{border-color:var(--orange)}
.result-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.result-value{font-size:18px;font-weight:600;line-height:1}
.result-value.blue{color:var(--blue)}
.result-value.green{color:var(--green)}
.result-value.orange{color:var(--orange)}
.result-sub{font-size:10px;color:var(--text2);margin-top:3px}
.usage-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.usage-pill{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:4px 8px;font-size:11px}
.usage-pill-dot{width:6px;height:6px;border-radius:50%}
.usage-pill-name{color:var(--text2)}
.usage-pill-val{font-weight:600;font-size:10px}
.sim-progress{margin-top:12px}
.sim-progress-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.sim-progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--orange));border-radius:3px}
.sim-time-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-top:4px}
.tooltip{position:fixed;background:#1c2128;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;color:var(--text);pointer-events:none;z-index:100;max-width:180px;box-shadow:0 4px 16px rgba(0,0,0,0.4);display:none}
.tooltip-name{font-weight:600;color:var(--blue);margin-bottom:3px}
.tooltip-time{color:var(--text2);font-size:10px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:320px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:6px;font-size:14px;outline:none;margin-bottom:16px}
.modal-input:focus{border-color:var(--blue)}
.modal-buttons{display:flex;gap:8px}
.modal-btn{flex:1;padding:10px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.modal-btn.primary{background:var(--blue);color:#fff}
.modal-btn.secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
@media(min-width:768px){.main{display:grid;grid-template-columns:320px 1fr;gap:0;padding:0;min-height:calc(100vh - 49px);padding-bottom:0}.left-panel{border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 49px)}.right-panel{display:flex;flex-direction:column;overflow:hidden}.gantt-section{flex:1;border:none;border-bottom:1px solid var(--border);border-radius:0;margin:0;min-height:0}.results-section{padding:16px;overflow-y:auto;margin:0}.controls{position:static;padding:0;background:transparent;border:none;margin-top:12px}.results-grid{grid-template-columns:repeat(4,1fr)}.station-fields{gap:8px}.header{flex-wrap:nowrap}.config-select{max-width:150px}}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:slideUp 0.3s ease forwards}
</style>
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="header-title"><div class="icon">⚙</div>UPH</div>
    <select class="config-select" id="configSelect"><option value="default">默认</option></select>
    <button class="config-btn" id="saveBtn" title="保存">💾</button>
    <button class="config-btn" id="saveAsBtn">另存为</button>
  </div>
  <div class="header-right">
    <select class="speed-select" id="speedSelect">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="2">2x</option>
      <option value="5">5x</option>
      <option value="0">瞬间</option>
    </select>
  </div>
</div>
<div class="main">
  <div class="left-panel">
    <div class="section-title">📦 基本参数</div>
    <div class="basic-param">
      <div class="param-row">
        <span class="param-label">产品总数</span>
        <input class="param-input" type="number" id="productCount" value="13" min="1" max="500">
      </div>
    </div>
    <div class="section-title">🔧 工站配置</div>
    <div class="station-list" id="stationList"></div>
    <button class="add-station-btn" id="addStationBtn">+ 添加工站</button>
    <div class="controls">
      <button class="btn btn-primary" id="simBtn"><span id="simBtnIcon">▶</span><span id="simBtnText">开始</span></button>
      <button class="btn btn-secondary" id="resetBtn">↺</button>
    </div>
  </div>
  <div class="right-panel">
    <div class="gantt-section">
      <div class="gantt-header">
        <div class="section-title" style="margin:0">📊 甘特图</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="display:flex;align-items:center;gap:4px">
            <button class="config-btn" id="zoomOutBtn" title="缩小">−</button>
            <span style="font-size:11px;color:var(--text2);min-width:36px;text-align:center" id="zoomLevel">100%</span>
            <button class="config-btn" id="zoomInBtn" title="放大">+</button>
            <button class="config-btn" id="zoomResetBtn" title="重置">⟲</button>
          </div>
          <div class="gantt-time-now" id="ganttTimeNow">T = 0 min</div>
        </div>
      </div>
      <div class="gantt-container" id="ganttContainer">
        <canvas id="ganttCanvas"></canvas>
        <div class="empty-gantt" id="emptyGantt">
          <div class="empty-gantt-icon">📈</div>
          <div class="empty-gantt-text">点击「开始」运行模拟</div>
        </div>
      </div>
    </div>
    <div class="results-section" id="resultsSection" style="display:none">
      <div class="section-title">📈 结果</div>
      <div class="results-grid">
        <div class="result-card highlight animate-in"><div class="result-label">UPH 产能</div><div class="result-value green" id="resUPH">—</div><div class="result-sub">片/小时</div></div>
        <div class="result-card animate-in"><div class="result-label">总时间</div><div class="result-value blue" id="resTotalTime">—</div><div class="result-sub" id="resTotalTimeSub">—</div></div>
        <div class="result-card animate-in"><div class="result-label">理论 UPH</div><div class="result-value" id="resTheoreticalUPH">—</div><div class="result-sub">上限</div></div>
        <div class="result-card warning animate-in"><div class="result-label">瓶颈</div><div class="result-value orange" id="resBottleneck">—</div><div class="result-sub" id="resBottleneckSub">—</div></div>
      </div>
      <div class="usage-pills" id="usagePills"></div>
      <div class="sim-progress" id="simProgress" style="display:none">
        <div class="sim-progress-track"><div class="sim-progress-fill" id="simProgressFill" style="width:0%"></div></div>
        <div class="sim-time-labels"><span>0</span><span id="simProgressEnd">—</span></div>
      </div>
    </div>
  </div>
</div>
<div class="tooltip" id="tooltip"><div class="tooltip-name" id="ttName"></div><div class="tooltip-time" id="ttTime"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">💾 另存为</div>
    <input class="modal-input" type="text" id="modalInput" placeholder="配置名称" maxlength="20">
    <div class="modal-buttons">
      <button class="modal-btn secondary" id="modalCancelBtn">取消</button>
      <button class="modal-btn primary" id="modalConfirmBtn">确定</button>
    </div>
  </div>
</div>
<script>
var COLORS=['#58a6ff','#f0883e','#3fb950','#bc8cff','#ff7b72','#79c0ff','#ffa657','#56d364'];
var stations=[{name:'涂层',time:6,buffer:2},{name:'切割',time:20,buffer:2},{name:'清洗',time:8,buffer:2}];
var simResult=null,isPlaying=false,rafId=null,simStartWallTime=0,simStartTime=0,totalSimTime=0,speed=1;
var configs={},currentConfigId='default',CONFIG_KEY='uph_configs';
function loadConfigs(){try{var s=localStorage.getItem(CONFIG_KEY);if(s)configs=JSON.parse(s);}catch(e){}if(!configs['default']){configs['default']={name:'默认',stations:[{name:'涂层',time:6,buffer:2},{name:'切割',time:20,buffer:2},{name:'清洗',time:8,buffer:2}],productCount:13};saveConfigs();}}
function saveConfigs(){try{localStorage.setItem(CONFIG_KEY,JSON.stringify(configs));}catch(e){}}
function updateConfigSelect(){var sel=document.getElementById('configSelect');sel.innerHTML='';Object.keys(configs).forEach(function(id){sel.innerHTML+='<option value="'+id+'">'+configs[id].name+'</option>';});sel.value=currentConfigId;}
function applyConfig(id){var c=configs[id];if(!c)return;currentConfigId=id;stations=JSON.parse(JSON.stringify(c.stations));document.getElementById('productCount').value=c.productCount||13;renderStations();updateConfigSelect();}
function getCurrentConfig(){return{stations:JSON.parse(JSON.stringify(stations)),productCount:parseInt(document.getElementById('productCount').value)||13};}
function generateId(){return'cfg_'+Date.now();}
function showModal(title,val){document.getElementById('modalTitle').textContent=title;document.getElementById('modalInput').value=val||'';document.getElementById('modalOverlay').classList.add('show');setTimeout(function(){document.getElementById('modalInput').focus();},100);}
function hideModal(){document.getElementById('modalOverlay').classList.remove('show');}
document.getElementById('modalCancelBtn').addEventListener('click',hideModal);
document.getElementById('modalConfirmBtn').addEventListener('click',function(){var name=document.getElementById('modalInput').value.trim();if(!name){alert('请输入名称');return;}var id=generateId();configs[id]={name:name,stations:getCurrentConfig().stations,productCount:getCurrentConfig().productCount};saveConfigs();currentConfigId=id;updateConfigSelect();hideModal();});
document.getElementById('configSelect').addEventListener('change',function(e){applyConfig(e.target.value);});
document.getElementById('saveBtn').addEventListener('click',function(){if(!configs[currentConfigId])return;configs[currentConfigId].stations=getCurrentConfig().stations;configs[currentConfigId].productCount=getCurrentConfig().productCount;saveConfigs();alert('已保存');});
document.getElementById('saveAsBtn').addEventListener('click',function(){showModal('💾 另存为','');});
function renderStations(){var list=document.getElementById('stationList');list.innerHTML='';stations.forEach(function(s,i){var c=COLORS[i%COLORS.length];list.innerHTML+='<div class="station-card" id="station-'+i+'"><div class="station-header"><div class="station-index" style="background:'+c+'22;color:'+c+'">'+(i+1)+'</div><input class="station-name-input" value="'+s.name+'" data-i="'+i+'" maxlength="8" />'+(stations.length>1?'<button class="station-delete" data-i="'+i+'">×</button>':'')+'</div><div class="station-fields"><div class="station-field"><label>处理时间</label><input type="number" value="'+s.time+'" data-i="'+i+'" data-field="time" min="1" max="999" /><div class="unit">分钟/片</div></div><div class="station-field"><label>缓冲容量</label><input type="number" value="'+s.buffer+'" data-i="'+i+'" data-field="buffer" min="1" max="99" /><div class="unit">片</div></div></div><div class="station-util-bar" id="util-bar-'+i+'" style="display:none"><span class="util-label">利用率</span><div class="util-bar-bg"><div class="util-bar-fill" id="util-fill-'+i+'" style="width:0%;background:'+c+'"></div></div><span class="util-pct" id="util-pct-'+i+'">0%</span></div></div>';});list.querySelectorAll('.station-name-input').forEach(function(el){el.addEventListener('input',function(e){stations[e.target.dataset.i].name=e.target.value;});});list.querySelectorAll('input[data-field]').forEach(function(el){el.addEventListener('input',function(e){var i=parseInt(e.target.dataset.i);var v=Math.max(1,parseInt(e.target.value)||1);stations[i][e.target.dataset.field]=v;});});list.querySelectorAll('.station-delete').forEach(function(el){el.addEventListener('click',function(e){stations.splice(parseInt(e.currentTarget.dataset.i),1);renderStations();});});}
document.getElementById('addStationBtn').addEventListener('click',function(){stations.push({name:'工站'+(stations.length+1),time:10,buffer:2});renderStations();});
function runSimulation(productCount,stns){var n=stns.length;if(n===0||productCount===0)return null;var productEvents=[];for(var p=0;p<productCount;p++)productEvents.push([]);var bufferCap=[];for(var s=0;s<n;s++){bufferCap.push(s===0?Infinity:stns[s].buffer);}var buffers=[];for(var s=0;s<n;s++)buffers.push([]);var machineFreeAt=[];for(var s=0;s<n;s++)machineFreeAt.push(0);var blockedProducts=[];for(var s=0;s<n;s++)blockedProducts.push([]);var pending=[];for(var p=productCount-1;p>=0;p--)pending.push(p);var events=[];var currentTime=0;function tryStart(s){if(machineFreeAt[s]>currentTime)return;var src=(s===0)?pending:buffers[s];if(src.length===0)return;var product=src.shift();var startTime=currentTime;var endTime=startTime+stns[s].time;machineFreeAt[s]=endTime;productEvents[product].push({station:s,start:startTime,end:endTime});events.push({time:endTime,type:'complete',product:product,station:s});}function tryStartAll(){for(var s=0;s<n;s++)tryStart(s);}tryStartAll();var maxIter=productCount*n*20+1000;var iter=0;while(events.length>0&&iter++<maxIter){events.sort(function(a,b){return a.time-b.time;});var ev=events.shift();currentTime=ev.time;if(ev.type==='complete'){var product=ev.product;var s=ev.station;if(s===n-1){}else{var next=s+1;if(buffers[next].length<bufferCap[next]){buffers[next].push(product);tryStart(next);}else{blockedProducts[s].push(product);}}tryStart(s);while(blockedProducts[s].length>0&&buffers[s+1].length<bufferCap[s+1]){var bp=blockedProducts[s].shift();buffers[s+1].push(bp);tryStart(s+1);}}}var totalTime=0;if(productCount>0&&productEvents[productCount-1].length>0){var lastEv=productEvents[productCount-1][productEvents[productCount-1].length-1];totalTime=lastEv.end;}var machineBusy=[];for(var s=0;s<n;s++)machineBusy.push(0);for(var p=0;p<productCount;p++){for(var e=0;e<productEvents[p].length;e++){var ev=productEvents[p][e];machineBusy[ev.station]+=ev.end-ev.start;}}var utilization=[];for(var s=0;s<n;s++)utilization.push(totalTime>0?machineBusy[s]/totalTime:0);var bottleneckIdx=0;var maxU=0;for(var s=0;s<n;s++){if(utilization[s]>maxU){maxU=utilization[s];bottleneckIdx=s;}}var slowest=0;for(var s=0;s<n;s++){if(stns[s].time>slowest)slowest=stns[s].time;}var theoreticalUPH=slowest>0?60/slowest:0;var actualUPH=totalTime>0?productCount/(totalTime/60):0;return{productEvents:productEvents,totalTime:totalTime,uph:actualUPH,theoreticalUPH:theoreticalUPH,bottleneckIdx:bottleneckIdx,utilization:utilization,productCount:productCount,stations:stns.map(function(s){return{name:s.name,time:s.time};})};}
var canvas=document.getElementById('ganttCanvas');var ctx=canvas.getContext('2d');var tooltip=document.getElementById('tooltip');var ttName=document.getElementById('ttName');var ttTime=document.getElementById('ttTime');
var ganttZoom=1;
function drawGantt(sim,currentTime){if(!sim)return;var pe=sim.productEvents,pc=sim.productCount,st=sim.stations,tt=sim.totalTime;var n=st.length;var padL=36,padR=10,padT=20,padB=12;var rowH=16,rowGap=1;var h=padT+padB+pc*(rowH+rowGap)+28;var tMax=Math.max(tt,1);var containerW=canvas.parentElement.clientWidth;var pxPerMin=Math.max(2,containerW/tMax)*ganttZoom;var w=Math.max(containerW,Math.ceil(tMax*pxPerMin)+padL+padR);var cw=w-padL-padR;canvas.width=w;canvas.height=h;ctx.fillStyle='#0d1117';ctx.fillRect(0,0,w,h);var ticks=Math.min(8,Math.ceil(tMax/5));ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='center';for(var i=0;i<=ticks;i++){var t=Math.round(i*tMax/ticks);var x=padL+(t/tMax)*cw;ctx.fillText(t+'m',x,padT-6);ctx.strokeStyle='#21262d';ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,h-padB);ctx.stroke();}if(currentTime>0&&currentTime<=tMax){var cx=padL+(currentTime/tMax)*cw;ctx.strokeStyle='#f0883e';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(cx,padT);ctx.lineTo(cx,h-padB);ctx.stroke();ctx.setLineDash([]);}pe.forEach(function(evts,pIdx){var rowY=padT+pIdx*(rowH+rowGap);var mid=rowY+rowH/2;ctx.fillStyle=pIdx%2===0?'#161b22':'#0d1117';ctx.fillRect(padL,rowY,cw,rowH);ctx.fillStyle='#58a6ff';ctx.font='bold 7px sans-serif';ctx.textAlign='right';ctx.fillText(''+(pIdx+1),padL-3,mid+2);evts.forEach(function(ev){var x1=padL+(Math.max(0,ev.start)/tMax)*cw;var x2=padL+(ev.end/tMax)*cw;var bw=Math.max(1,x2-x1);var col=COLORS[ev.station%COLORS.length];ctx.fillStyle=col+'bb';ctx.fillRect(x1,rowY+1,bw,rowH-2);if(bw>12){ctx.fillStyle='#fff';ctx.font='6px sans-serif';ctx.textAlign='left';ctx.fillText(st[ev.station].name,x1+2,mid+1);}});});var ly=h-6;var lx=padL;st.forEach(function(s,i){ctx.fillStyle=COLORS[i%COLORS.length];ctx.fillRect(lx,ly-4,8,4);ctx.fillStyle='#8b949e';ctx.font='7px sans-serif';ctx.textAlign='left';ctx.fillText(s.name,lx+10,ly);lx+=ctx.measureText(s.name).width+18;});}
canvas.addEventListener('mousemove',function(e){if(!simResult)return;var rect=canvas.getBoundingClientRect();var mx=e.clientX-rect.left;var my=e.clientY-rect.top;var padL=36,padT=20;var rowH=16,rowGap=1;var tMax=Math.max(simResult.totalTime,1);var cw=canvas.width-padL-10;var relY=my-padT;if(relY<0)return;var pIdx=Math.floor(relY/(rowH+rowGap));if(pIdx<0||pIdx>=simResult.productCount){tooltip.style.display='none';return;}var evts=simResult.productEvents[pIdx]||[];var ev=null;for(var j=0;j<evts.length;j++){var ee=evts[j];var x1=padL+(ee.start/tMax)*cw;var x2=padL+(ee.end/tMax)*cw;if(mx>=x1&&mx<=x2){ev=ee;break;}}if(ev){ttName.textContent='P'+(pIdx+1)+' · '+simResult.stations[ev.station].name;ttTime.textContent=ev.start.toFixed(0)+'m → '+ev.end.toFixed(0)+'m';tooltip.style.display='block';tooltip.style.left=(e.clientX+10)+'px';tooltip.style.top=(e.clientY-10)+'px';}else{tooltip.style.display='none';}});
canvas.addEventListener('mouseleave',function(){tooltip.style.display='none';});
function showResults(sim){var el=document.getElementById('resultsSection');el.style.display='block';var tm=sim.totalTime;var h=Math.floor(tm/60);var m=Math.round(tm%60);document.getElementById('resUPH').textContent=sim.uph.toFixed(2);document.getElementById('resTotalTime').textContent=tm.toFixed(0)+'m';document.getElementById('resTotalTimeSub').textContent=h>0?h+'h '+m+'m':m+'m';document.getElementById('resTheoreticalUPH').textContent=sim.theoreticalUPH.toFixed(2);document.getElementById('resBottleneck').textContent=sim.stations[sim.bottleneckIdx].name;document.getElementById('resBottleneckSub').textContent='利用率 '+Math.round(sim.utilization[sim.bottleneckIdx]*100)+'%';sim.stations.forEach(function(s,i){var bar=document.getElementById('util-bar-'+i);if(!bar)return;bar.style.display='flex';document.getElementById('util-fill-'+i).style.width=Math.round(sim.utilization[i]*100)+'%';document.getElementById('util-pct-'+i).textContent=Math.round(sim.utilization[i]*100)+'%';});document.querySelectorAll('.station-card').forEach(function(c,i){c.classList.toggle('bottleneck',i===sim.bottleneckIdx);var tag=c.querySelector('.btl-tag');if(tag)tag.remove();if(i===sim.bottleneckIdx){var t=document.createElement('div');t.className='btl-tag';t.textContent='瓶颈';c.appendChild(t);}});var pills=document.getElementById('usagePills');pills.innerHTML='';sim.stations.forEach(function(s,i){var p=document.createElement('div');p.className='usage-pill';p.innerHTML='<div class="usage-pill-dot" style="background:'+COLORS[i%COLORS.length]+'"></div><span class="usage-pill-name">'+s.name+'</span><span class="usage-pill-val" style="color:'+COLORS[i%COLORS.length]+'">'+Math.round(sim.utilization[i]*100)+'%</span>';pills.appendChild(p);});document.getElementById('simProgressEnd').textContent=tm.toFixed(0)+' min';}
function stopSim(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}isPlaying=false;document.getElementById('simBtn').classList.remove('playing');document.getElementById('simBtnIcon').textContent='▶';document.getElementById('simBtnText').textContent='开始';document.getElementById('simProgress').style.display='none';}
function doSim(){stopSim();var nProducts=parseInt(document.getElementById('productCount').value)||13;simResult=runSimulation(nProducts,stations);totalSimTime=simResult.totalTime;showResults(simResult);document.getElementById('emptyGantt').style.display='none';drawGantt(simResult,0);document.getElementById('ganttTimeNow').textContent='T = 0 min';speed=parseFloat(document.getElementById('speedSelect').value);simStartWallTime=performance.now();simStartTime=0;document.getElementById('simBtn').classList.add('playing');document.getElementById('simBtnIcon').textContent='⏸';document.getElementById('simBtnText').textContent='暂停';if(speed===0){drawGantt(simResult,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+totalSimTime.toFixed(0)+' min';document.getElementById('simProgressFill').style.width='100%';stopSim();return;}document.getElementById('simProgress').style.display='block';function tick(){var elapsed=(performance.now()-simStartWallTime)/1000;var curT=Math.min(simStartTime+elapsed*speed,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+curT.toFixed(0)+' min';document.getElementById('simProgressFill').style.width=((curT/totalSimTime)*100).toFixed(1)+'%';drawGantt(simResult,curT);if(curT>=totalSimTime){stopSim();return;}rafId=requestAnimationFrame(tick);}rafId=requestAnimationFrame(tick);isPlaying=true;}
document.getElementById('simBtn').addEventListener('click',function(){if(isPlaying){stopSim();}else{doSim();}});
document.getElementById('resetBtn').addEventListener('click',function(){stopSim();simResult=null;document.getElementById('resultsSection').style.display='none';document.getElementById('emptyGantt').style.display='flex';document.getElementById('simProgress').style.display='none';ctx.clearRect(0,0,canvas.width,canvas.height);canvas.height=canvas.parentElement.clientHeight||300;document.getElementById('ganttTimeNow').textContent='T = 0 min';document.querySelectorAll('.station-card').forEach(function(c){c.classList.remove('bottleneck');var t=c.querySelector('.btl-tag');if(t)t.remove();var bar=c.querySelector('.station-util-bar');if(bar)bar.style.display='none';});});
document.getElementById('speedSelect').addEventListener('change',function(e){speed=parseFloat(e.target.value);if(isPlaying&&speed>0){var curT=parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0;stopSim();simStartWallTime=performance.now();simStartTime=curT;document.getElementById('simBtn').classList.add('playing');document.getElementById('simBtnIcon').textContent='⏸';document.getElementById('simBtnText').textContent='暂停';document.getElementById('simProgress').style.display='block';isPlaying=true;function tick(){var elapsed=(performance.now()-simStartWallTime)/1000;var c2=Math.min(simStartTime+elapsed*speed,totalSimTime);document.getElementById('ganttTimeNow').textContent='T = '+c2.toFixed(0)+' min';document.getElementById('simProgressFill').style.width=((c2/totalSimTime)*100).toFixed(1)+'%';drawGantt(simResult,c2);if(c2>=totalSimTime){stopSim();return;}rafId=requestAnimationFrame(tick);}rafId=requestAnimationFrame(tick);}});
loadConfigs();applyConfig('default');renderStations();
document.getElementById('zoomInBtn').addEventListener('click',function(){ganttZoom=Math.min(ganttZoom*1.5,10);document.getElementById('zoomLevel').textContent=Math.round(ganttZoom*100)+'%';if(simResult)drawGantt(simResult,parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0);});
document.getElementById('zoomOutBtn').addEventListener('click',function(){ganttZoom=Math.max(ganttZoom/1.5,0.1);document.getElementById('zoomLevel').textContent=Math.round(ganttZoom*100)+'%';if(simResult)drawGantt(simResult,parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0);});
document.getElementById('zoomResetBtn').addEventListener('click',function(){ganttZoom=1;document.getElementById('zoomLevel').textContent='100%';if(simResult)drawGantt(simResult,parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0);});
window.addEventListener('resize',function(){if(simResult)drawGantt(simResult,parseFloat(document.getElementById('ganttTimeNow').textContent.replace('T = ','').replace(' min',''))||0);});
</script>
</body>
